name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: dropdown
    id: mode
    attributes:
      label: What mode were you using?
      options:
        - Ghost
        - Sentry
        - Guardian
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Website URL
      description: The URL where the bug occurred
      placeholder: https://example.com
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug — what did you expect vs what actually happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Visit https://example.com
        2. Click the shield icon
        3. Switch to Guardian mode
        4. See error...
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Edge
        - Safari
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension version
      description: Found in the popup footer or chrome://extensions
      placeholder: "1.0.0"
