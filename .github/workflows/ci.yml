name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (${{ matrix.browser }})
        run: npx wxt build -b ${{ matrix.browser }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortex-shield-${{ matrix.browser }}
          path: .output/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  zip:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create distribution ZIPs
        run: |
          npx wxt zip -b chrome
          npx wxt zip -b firefox

      - name: Upload Chrome ZIP
        uses: actions/upload-artifact@v4
        with:
          name: cortex-shield-chrome-zip
          path: .output/*.zip

      - name: Upload Firefox ZIP
        uses: actions/upload-artifact@v4
        with:
          name: cortex-shield-firefox-zip
          path: .output/*.zip
